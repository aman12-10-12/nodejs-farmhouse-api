<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link
      href="https://fonts.googleapis.com/css?family=Megrim|Nunito+Sans:400,900"
      rel="stylesheet"
    />
    <link
      rel="icon"
      href="https://emojipedia-us.s3.dualstack.us-west-1.amazonaws.com/thumbs/240/apple/155/ear-of-maize_1f33d.png"
    />

    <title>{%PRODUCTNAME%} {%IMAGE%} /// Farm House</title>

    <style>
      :root {
        --color-text: #2d3a35;
        --color-surface: #ffffff;
        --color-panel: #f0f4f2;
        --gradient-page: linear-gradient(
          125deg,
          #5cb85c 0%,
          #26c6da 35%,
          #7cb342 70%,
          #00897b 100%
        );
        --gradient-hero: linear-gradient(
          155deg,
          rgba(102, 187, 106, 0.75) 0%,
          rgba(38, 166, 154, 0.65) 50%,
          rgba(0, 172, 193, 0.7) 100%
        );
        --gradient-title: linear-gradient(
          180deg,
          #66bb6a 0%,
          #26a69a 55%,
          #00897b 100%
        );
        --gradient-cta: linear-gradient(135deg, #43a047 0%, #00897b 100%);
        --gradient-badge: linear-gradient(145deg, #7cb342 0%, #00acc1 100%);
        --shadow-product: 0 1.5rem 4.5rem rgba(13, 59, 46, 0.2);
        --skew-cta: -18deg;
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: inherit;
      }

      html {
        font-size: 62.5%;
        box-sizing: border-box;
        scroll-behavior: smooth;
      }

      @media (max-width: 37.5em) {
        html {
          font-size: 56.25%;
        }
      }

      @media (min-width: 112.5em) {
        html {
          font-size: 70%;
        }
      }

      body {
        padding: clamp(1.5rem, 4vw, 5rem) clamp(1rem, 3vw, 5rem)
          clamp(3rem, 8vw, 10rem);
        padding-bottom: max(3rem, env(safe-area-inset-bottom));
        padding-left: max(1rem, env(safe-area-inset-left));
        padding-right: max(1rem, env(safe-area-inset-right));
        line-height: 1.7;
        font-family: "Nunito Sans", sans-serif;
        color: var(--color-text);
        min-height: 100vh;
        min-height: 100dvh;
        background: var(--gradient-page);
        background-size: 200% 200%;
        animation: pageGradient 18s ease-in-out infinite;
      }

      @keyframes pageGradient {
        0%,
        100% {
          background-position: 0% 40%;
        }
        50% {
          background-position: 100% 60%;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        body {
          animation: none;
          background-size: 100% 100%;
        }
      }

      h1 {
        font-family: "Megrim", sans-serif;
        font-size: clamp(3.2rem, 7vw + 1rem, 7rem);
        color: #fff;
        text-shadow: 0 0.2rem 1.5rem rgba(0, 0, 0, 0.15);
        transform: skewY(-4deg);
        text-align: center;
        position: relative;
        word-spacing: 0.2em;
        margin-bottom: clamp(0.5rem, 2vw, 2rem);
      }

      h1::before {
        content: "";
        display: block;
        height: 65%;
        width: min(49%, 28rem);
        position: absolute;
        top: 105%;
        left: 50%;
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.35),
          rgba(0, 137, 123, 0.35)
        );
        opacity: 0.85;
        z-index: -1;
        transform: skewY(370deg) translate(-50%, -50%);
        border-radius: 0.4rem;
      }

      .container {
        width: min(95rem, 100%);
        max-width: 100%;
        margin: 0 auto;
        padding: 0 clamp(0.5rem, 2vw, 1rem);
      }

      .product {
        width: min(60rem, 100%);
        max-width: 100%;
        margin: clamp(3rem, 10vw, 9rem) auto 0;
        background: var(--color-surface);
        box-shadow: var(--shadow-product);
        position: relative;
        border-radius: 1.2rem;
        overflow: hidden;
      }

      .product__hero {
        position: relative;
        height: clamp(14rem, 42vw, 22rem);
        min-height: 14rem;
        overflow: hidden;
      }

      .product__hero::before {
        content: "";
        display: block;
        height: 100%;
        width: 100%;
        position: absolute;
        top: 0;
        left: 0;
        background-image: var(--gradient-hero);
        opacity: 0.85;
        z-index: 100;
      }

      .product__emoji {
        font-size: clamp(8rem, 28vw, 15rem);
        position: absolute;
      }

      .product__emoji--1 {
        top: -4rem;
        left: -2rem;
        z-index: 10;
      }

      .product__emoji--2 {
        top: -6rem;
        left: 9rem;
      }

      .product__emoji--3 {
        top: -4rem;
        right: 15rem;
      }

      .product__emoji--4 {
        top: -5rem;
        right: 2rem;
        z-index: 10;
      }

      .product__emoji--5 {
        bottom: -9rem;
        left: 18rem;
      }

      .product__emoji--6 {
        bottom: -8rem;
        left: 5rem;
      }

      .product__emoji--7 {
        bottom: -12rem;
        right: 14rem;
      }

      .product__emoji--8 {
        bottom: -8rem;
        right: -2rem;
      }

      .product__emoji--9 {
        top: -7rem;
        left: 19rem;
      }

      .product__organic {
        position: absolute;
        top: clamp(-3rem, -2vw, -4rem);
        right: clamp(-2rem, -1vw, -4rem);
        z-index: 1000;
        height: clamp(8rem, 18vw, 11rem);
        width: clamp(8rem, 18vw, 11rem);
        background-image: var(--gradient-badge);
        background-size: 140% 140%;
        animation: badgePulse 10s ease-in-out infinite;
        border-radius: 50%;
        transform: rotate(15deg);
        box-shadow: 0 1.2rem 3rem rgba(0, 0, 0, 0.25);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      @keyframes badgePulse {
        0%,
        100% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .product__organic {
          animation: none;
          background-size: 100% 100%;
        }
      }

      .product__organic h5 {
        font-weight: 900;
        text-transform: uppercase;
        font-size: clamp(1.3rem, 2vw, 1.8rem);
        color: #fff;
        text-shadow: 0 0.1rem 0.3rem rgba(0, 0, 0, 0.2);
      }

      .product__back:link,
      .product__back:visited {
        position: absolute;
        top: clamp(1rem, 3vw, 2rem);
        left: clamp(1rem, 3vw, 2rem);
        font-size: clamp(1.3rem, 1.5vw + 0.5rem, 1.5rem);
        font-weight: 700;
        text-transform: uppercase;
        text-decoration: none;
        z-index: 1000;
        color: var(--color-text);
        background-color: rgba(255, 255, 255, 0.95);
        box-shadow: 0 0.6rem 2rem rgba(0, 0, 0, 0.12);
        border-radius: 100rem;
        padding: 0.6rem clamp(1.2rem, 3vw, 2rem);
        transition: background-color 0.3s ease, transform 0.2s ease;
        display: flex;
        align-items: center;
      }

      .product__back:hover,
      .product__back:active {
        background-color: #c8e6c9;
        transform: translateY(-0.1rem);
      }

      .product__name {
        background: var(--gradient-title);
        background-size: 120% 120%;
        padding: clamp(1rem, 2.5vw, 1.2rem);
        font-family: "Megrim", sans-serif;
        font-size: clamp(2.4rem, 5vw + 1rem, 4.2rem);
        color: #fff;
        text-align: center;
        word-spacing: 0.15em;
        text-shadow: 0 0.15rem 0.5rem rgba(0, 0, 0, 0.12);
      }

      .product__details {
        background-color: var(--color-panel);
        padding: clamp(2rem, 5vw, 4rem) clamp(1.5rem, 6vw, 6rem);
        font-size: clamp(1.5rem, 1.8vw + 1rem, 1.9rem);
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-gap: clamp(1rem, 2vw, 1.5rem);
      }

      .product__description {
        padding: clamp(2.5rem, 6vw, 5rem) clamp(1.5rem, 6vw, 6rem);
        font-size: clamp(1.45rem, 1.3vw + 1rem, 1.65rem);
        line-height: 1.85;
        color: var(--color-text);
      }

      .product__link:link,
      .product__link:visited {
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--gradient-cta);
        color: #fff;
        font-size: clamp(1.45rem, 1.3vw + 1rem, 1.65rem);
        font-weight: 700;
        text-transform: uppercase;
        text-decoration: none;
        padding: clamp(1.2rem, 3vw, 1.6rem);
        text-align: center;
        transform: scale(1.04) skewX(var(--skew-cta));
        box-shadow: 0 1.2rem 3rem rgba(13, 59, 46, 0.18);
        transition: filter 0.3s ease, transform 0.25s ease;
      }

      .product__link:hover,
      .product__link:active {
        filter: brightness(1.08);
        transform: scale(1.07) skewX(var(--skew-cta));
      }

      .product__link span {
        transform: skewX(calc(-1 * var(--skew-cta)));
      }

      .emoji-left {
        font-size: clamp(1.6rem, 2vw, 2rem);
        margin-right: 1rem;
      }

      .emoji-right {
        font-size: clamp(1.6rem, 2vw, 2rem);
        margin-left: 1rem;
      }

      .not-organic {
        display: none;
      }

      /* Mobile */
      @media (max-width: 37.4375em) {
        :root {
          --skew-cta: 0deg;
        }

        .product__details {
          grid-template-columns: 1fr;
        }

        .product__link:link,
        .product__link:visited {
          transform: none;
          width: 100%;
          border-radius: 0;
        }

        .product__link:hover,
        .product__link:active {
          transform: scale(1.01);
        }

        .product__link span {
          transform: none;
        }

        .product__emoji--3,
        .product__emoji--7 {
          opacity: 0.65;
        }
      }

      /* Tablet */
      @media (min-width: 37.5em) and (max-width: 56.1875em) {
        .product__details {
          grid-template-columns: 1fr 1fr;
        }
      }

      /* Large / TV */
      @media (min-width: 90em) {
        .container {
          max-width: min(120rem, 96vw);
        }

        .product {
          box-shadow: 0 2rem 6rem rgba(13, 59, 46, 0.18);
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>🌽 Farm House 🥦</h1>

      <figure class="product">
        <div class="product__organic {%NOT_ORGANIC%}"><h5>Organic</h5></div>
        <a href="/overview" class="product__back">
          <span class="emoji-left">👈</span>Back
        </a>
        <div class="product__hero">
          <span class="product__emoji product__emoji--1">{%IMAGE%}</span>
          <span class="product__emoji product__emoji--2">{%IMAGE%}</span>
          <span class="product__emoji product__emoji--3">{%IMAGE%}</span>
          <span class="product__emoji product__emoji--4">{%IMAGE%}</span>
          <span class="product__emoji product__emoji--5">{%IMAGE%}</span>
          <span class="product__emoji product__emoji--6">{%IMAGE%}</span>
          <span class="product__emoji product__emoji--7">{%IMAGE%}</span>
          <span class="product__emoji product__emoji--8">{%IMAGE%}</span>
          <span class="product__emoji product__emoji--9">{%IMAGE%}</span>
        </div>
        <h2 class="product__name">{%PRODUCTNAME%}</h2>
        <div class="product__details">
          <p><span class="emoji-left">🌍</span> From {%FROM%}</p>
          <p><span class="emoji-left">❤️</span> {%NUTRIENTS%}</p>
          <p><span class="emoji-left">📦</span> {%QUANTITY%}</p>
          <p><span class="emoji-left">🏷</span> {%PRICE%}€</p>
        </div>

        <a href="#" class="product__link">
          <span class="emoji-left">🛒</span>
          <span>Add to shopping card ({%PRICE%}€)</span>
        </a>

        <p class="product__description">{%DESCRIPTION%}</p>
      </figure>
    </div>
  </body>
</html>
